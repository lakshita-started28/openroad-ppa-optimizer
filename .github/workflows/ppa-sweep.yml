name: PPA Parameter Sweep

on:
  workflow_dispatch:
    inputs:
      design:
        description: "Design (gcd or aes)"
        required: true
        default: "gcd"
        type: choice
        options:
          - gcd
          - aes
      config_ids:
        description: "Config IDs (1,2,3)"
        required: true
        default: "1,2,3"

jobs:
  run-openroad:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        config_id: ${{ fromJSON(format('[{0}]', github.event.inputs.config_ids)) }}
      fail-fast: false
      max-parallel: 2
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys
          yosys -version
          which yosys
      
      - name: Clone OpenROAD-flow-scripts
        run: |
          git clone --depth 1 https://github.com/The-OpenROAD-Project/OpenROAD-flow-scripts.git
      
      - name: Point ORFS to system Yosys
        run: |
          cd OpenROAD-flow-scripts
          
          # Create fake tool directory structure
          mkdir -p tools/install/yosys/bin
          
          # Symlink system yosys to where ORFS expects it
          ln -s /usr/bin/yosys tools/install/yosys/bin/yosys
          ln -s /usr/bin/yosys-abc tools/install/yosys/bin/yosys-abc
          ln -s /usr/bin/yosys-config tools/install/yosys/bin/yosys-config
          
          # Verify
          ls -la tools/install/yosys/bin/
      
      - name: Modify config
        run: |
          python3 scripts/modify_config.py \
            ${{ github.event.inputs.design }} \
            ${{ matrix.config_id }} \
            OpenROAD-flow-scripts
      
      - name: Run synthesis
        run: |
          cd OpenROAD-flow-scripts/flow
          
          # Run synthesis with system Yosys
          make DESIGN_CONFIG=./designs/nangate45/${{ github.event.inputs.design }}/config_run${{ matrix.config_id }}.mk synth
          
          echo "=== Synthesis logs ==="
          ls -la logs/nangate45/${{ github.event.inputs.design }}/base/
      
      - name: Extract metrics
        run: |
          mkdir -p results
          
          LOG="OpenROAD-flow-scripts/flow/logs/nangate45/${{ github.event.inputs.design }}/base/1_1_yosys.log"
          
          if [ -f "$LOG" ]; then
            echo "=== Found synthesis log ==="
            
            CELLS=$(grep "Number of cells:" "$LOG" | grep -oE '[0-9]+' | head -1)
            WIRES=$(grep "Number of wires:" "$LOG" | grep -oE '[0-9]+' | head -1)
            
            cat > results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "cell_count": ${CELLS:-null},
            "wire_count": ${WIRES:-null},
            "status": "success"
          }
          EOF
          
          else
            echo "ERROR: Synthesis log not found"
            
            cat > results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "cell_count": null,
            "wire_count": null,
            "status": "log_missing"
          }
          EOF
          fi
          
          echo "=== Generated JSON ==="
          cat results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.inputs.design }}-${{ matrix.config_id }}
          path: results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
