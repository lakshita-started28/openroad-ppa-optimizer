name: PPA Parameter Sweep

on:
  workflow_dispatch:
    inputs:
      design:
        description: "Design name"
        required: true
        default: "gcd"
        type: choice
        options:
          - gcd
          - aes
      config_ids:
        description: "Config IDs (e.g., 1,2,3)"
        required: true
        default: "1,2,3"

jobs:
  run-openroad:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        config_id: ${{ fromJSON(format('[{0}]', github.event.inputs.config_ids)) }}
      fail-fast: false
      max-parallel: 3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      
      - name: Clone OpenROAD-flow-scripts
        run: |
          git clone --depth 1 https://github.com/The-OpenROAD-Project/OpenROAD-flow-scripts.git
          ls -la OpenROAD-flow-scripts/flow/designs/nangate45/
      
      - name: Create modified config
        run: |
          python3 scripts/modify_config.py \
            ${{ github.event.inputs.design }} \
            ${{ matrix.config_id }} \
            OpenROAD-flow-scripts
      
      - name: Run OpenROAD via Docker
        run: |
          cd OpenROAD-flow-scripts/flow
          
          # Run synthesis + placement only
          docker run --rm \
            -v $(pwd):/OpenROAD-flow-scripts/flow \
            -w /OpenROAD-flow-scripts/flow \
            openroad/flow-ubuntu22.04:latest \
            bash -c "make DESIGN_CONFIG=./designs/nangate45/${{ github.event.inputs.design }}/config_run${{ matrix.config_id }}.mk synth place"
          
          # List what was generated
          echo "=== Generated files ==="
          ls -la results/nangate45/${{ github.event.inputs.design }}/base/ || echo "No results"
          ls -la logs/nangate45/${{ github.event.inputs.design }}/base/ || echo "No logs"
          ls -la reports/nangate45/${{ github.event.inputs.design }}/base/ || echo "No reports"
      
      - name: Extract metrics from logs
        run: |
          mkdir -p ${{ github.workspace }}/results
          
          LOG_DIR="OpenROAD-flow-scripts/flow/logs/nangate45/${{ github.event.inputs.design }}/base"
          
          # Try to extract from placement log
          if [ -f "$LOG_DIR/3_place.log" ]; then
            echo "Found placement log"
            
            # Extract area from log
            AREA=$(grep -oP "Design area \K[\d.]+" "$LOG_DIR/3_place.log" | tail -1)
            CELLS=$(grep -oP "Number of cells: \K\d+" "$LOG_DIR/3_place.log" | tail -1)
            
            # Create JSON with extracted data
            cat > ${{ github.workspace }}/results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "area_um2": ${AREA:-null},
            "cell_count": ${CELLS:-null},
            "status": "completed"
          }
          EOF
          
          else
            echo "No placement log found - creating null result"
            cat > ${{ github.workspace }}/results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "area_um2": null,
            "cell_count": null,
            "status": "failed"
          }
          EOF
          fi
          
          echo "=== Generated JSON ==="
          cat ${{ github.workspace }}/results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
      
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.inputs.design }}-${{ matrix.config_id }}
          path: results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
          retention-days: 5
