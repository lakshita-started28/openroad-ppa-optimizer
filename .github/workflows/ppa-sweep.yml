name: PPA Parameter Sweep

on:
  workflow_dispatch:
    inputs:
      design:
        description: "Design (gcd or aes)"
        required: true
        default: "gcd"
        type: choice
        options:
          - gcd
          - aes
      config_ids:
        description: "Config IDs (1,2,3)"
        required: true
        default: "1,2,3"

jobs:
  run-synthesis:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        config_id: ${{ fromJSON(format('[{0}]', github.event.inputs.config_ids)) }}
      fail-fast: false
      max-parallel: 3
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install Yosys
        run: |
          sudo apt-get update
          sudo apt-get install -y yosys
      
      - name: Get design RTL
        run: |
          # Clone ORFS just to get the RTL files
          git clone --depth 1 https://github.com/The-OpenROAD-Project/OpenROAD-flow-scripts.git
          
          # Copy design RTL to working directory
          cp -r OpenROAD-flow-scripts/flow/designs/src/${{ github.event.inputs.design }} ./rtl/
          
          ls -la rtl/
      
      - name: Run direct Yosys synthesis
        run: |
          mkdir -p results logs
          
          # Create simple Yosys script
          cat > synth_${{ github.event.inputs.design }}.ys << 'EOF'
          # Read Verilog
          read_verilog rtl/*.v
          
          # Generic synthesis
          synth -top gcd
          
          # Print statistics
          stat
          
          # Write output
          write_verilog results/${{ github.event.inputs.design }}_synth.v
          EOF
          
          # Run Yosys
          yosys synth_${{ github.event.inputs.design }}.ys | tee logs/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.log
      
      - name: Extract cell count from log
        run: |
          mkdir -p artifacts
          
          LOG="logs/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.log"
          
          if [ -f "$LOG" ]; then
            # Extract number of cells
            CELLS=$(grep "Number of cells:" "$LOG" | grep -oE '[0-9]+' | head -1)
            
            # Extract number of wires  
            WIRES=$(grep "Number of wires:" "$LOG" | grep -oE '[0-9]+' | head -1)
            
            cat > artifacts/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "cell_count": ${CELLS:-null},
            "wire_count": ${WIRES:-null},
            "status": "success"
          }
          EOF
          
          else
            cat > artifacts/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "cell_count": null,
            "wire_count": null,
            "status": "no_log"
          }
          EOF
          fi
          
          cat artifacts/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
      
      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.inputs.design }}-${{ matrix.config_id }}
          path: artifacts/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
