name: PPA Parameter Sweep

on:
  workflow_dispatch:
    inputs:
      design:
        description: "Design name (gcd, aes, ibex)"
        required: true
        default: "gcd"
        type: choice
        options:
          - gcd
          - aes
          - ibex

      config_ids:
        description: "Comma-separated config IDs"
        required: true
        default: "1,2,3,4,5"

jobs:
  run-openroad:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        config_id: ${{ fromJSON(format('[{0}]', github.event.inputs.config_ids)) }}
      fail-fast: false
      max-parallel: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Pull OpenROAD Docker image
        run: docker pull openroad/orfs:latest

      - name: Run OpenROAD Flow
        run: |
          docker run --rm \
          -v ${{ github.workspace }}:/workspace \
          -w /OpenROAD-flow-scripts/flow \
          openroad/orfs:latest \
          bash -c "
          cp -r /OpenROAD-flow-scripts . &&
          cd OpenROAD-flow-scripts/flow &&
          make DESIGN_CONFIG=./designs/nangate45/${{ github.event.inputs.design }}/config.mk
          "

      - name: Extract metrics
        run: |
          mkdir -p results

          REPORT_DIR="OpenROAD-flow-scripts/flow/reports/nangate45/${{ github.event.inputs.design }}/base"

          if [ ! -d "$REPORT_DIR" ]; then
            echo '{"config_id": '${{ matrix.config_id }}', "status":"no_reports"}' \
            > results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
            exit 0
          fi

          REPORT_FILE=$(find "$REPORT_DIR" -name "*.rpt" -o -name "*.txt" | head -n 1)

          if [ -z "$REPORT_FILE" ]; then
            echo '{"config_id": '${{ matrix.config_id }}', "status":"report_missing"}' \
            > results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
            exit 0
          fi

          python3 scripts/extract_metrics.py \
          "$REPORT_FILE" \
          ${{ matrix.config_id }} \
          results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: ppa-results-${{ github.event.inputs.design }}-config${{ matrix.config_id }}
          path: results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
          retention-days: 7
