name: PPA Parameter Sweep

on:
  workflow_dispatch:
    inputs:
      design:
        description: "Design (gcd or aes)"
        required: true
        default: "gcd"
        type: choice
        options:
          - gcd
          - aes
      config_ids:
        description: "Config IDs (e.g., 1,2,3)"
        required: true
        default: "1,2,3"

jobs:
  run-openroad:
    runs-on: ubuntu-22.04
    
    strategy:
      matrix:
        config_id: ${{ fromJSON(format('[{0}]', github.event.inputs.config_ids)) }}
      fail-fast: false
      max-parallel: 3
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install OpenROAD
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          
          # Download prebuilt OpenROAD binary
          wget https://github.com/The-OpenROAD-Project/OpenROAD/releases/download/v2.0.16697/openroad_2.0_amd64-ubuntu22.04.deb
          
          # Install it
          sudo apt-get install -y ./openroad_2.0_amd64-ubuntu22.04.deb
          
          # Verify
          openroad -version
      
      - name: Clone ORFS
        run: |
          git clone --depth 1 https://github.com/The-OpenROAD-Project/OpenROAD-flow-scripts.git
          cd OpenROAD-flow-scripts
          
          # Install dependencies
          sudo ./setup.sh
      
      - name: Modify config
        run: |
          python3 scripts/modify_config.py \
            ${{ github.event.inputs.design }} \
            ${{ matrix.config_id }} \
            OpenROAD-flow-scripts
      
      - name: Run flow to placement
        run: |
          cd OpenROAD-flow-scripts/flow
          
          # Run just synthesis + floorplan + placement
          make DESIGN_CONFIG=./designs/nangate45/${{ github.event.inputs.design }}/config_run${{ matrix.config_id }}.mk \
            do-2_1_floorplan do-3_1_place_gp
          
          echo "=== Checking outputs ==="
          ls -la logs/nangate45/${{ github.event.inputs.design }}/base/
      
      - name: Extract metrics
        run: |
          mkdir -p results
          
          # Extract from floorplan log
          LOG="OpenROAD-flow-scripts/flow/logs/nangate45/${{ github.event.inputs.design }}/base/2_1_floorplan.log"
          
          if [ -f "$LOG" ]; then
            AREA=$(grep "Design area" "$LOG" | grep -oE '[0-9]+\.[0-9]+' | head -1)
            UTIL=$(grep "Util" "$LOG" | grep -oE '[0-9]+\.[0-9]+' | head -1)
            
            cat > results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "area_um2": ${AREA:-null},
            "utilization": ${UTIL:-null},
            "status": "success"
          }
          EOF
          else
            cat > results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json << EOF
          {
            "config_id": ${{ matrix.config_id }},
            "design": "${{ github.event.inputs.design }}",
            "area_um2": null,
            "utilization": null,
            "status": "failed"
          }
          EOF
          fi
          
          cat results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ github.event.inputs.design }}-${{ matrix.config_id }}
          path: results/${{ github.event.inputs.design }}_config${{ matrix.config_id }}.json
